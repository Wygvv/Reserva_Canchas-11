<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<h1>Login</h1>

<form id="loginForm">

    <input
        type="email"
        id="email"
        placeholder="Email"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required
    >

    <button type="submit">
        Ingresar
    </button>

</form>

<p>
    <a href="register.html">
        Crear cuenta
    </a>
</p>

<script src="../js/login.js"></script>

</body>
</html>
