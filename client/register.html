<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<h1>Registro</h1>

<form id="registerForm">

    <input
        type="text"
        id="nombre"
        placeholder="Nombre"
        required
    >

    <input
        type="email"
        id="email"
        placeholder="Email"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required
    >

    <button type="submit">
        Registrarse
    </button>

</form>

<p>
    <a href="login.html">
        Ir al Login
    </a>
</p>

<script src="../js/register.js"></script>

</body>
</html>
